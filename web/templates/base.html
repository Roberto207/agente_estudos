<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}estudAI{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Paleta estudAI — única fonte de verdade das cores. Edite aqui pra mudar o tema.
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          canvas: "#0b0d14",
          surface: "#11131c",
          surface2: "#171a26",
          surface3: "#1f2333",
          edge: "#262b3d",
          primary: "#e6e8f0",
          secondary: "#9aa0b4",
          muted: "#5f6478",
          accent: "#7c5cff",
          "accent-hover": "#9176ff",
          teal: "#34e1c8",
          warn: "#f5b95c",
          danger: "#f0667a",
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="/static/css/theme.css">
{% block head %}{% endblock %}
</head>
<body class="bg-canvas text-primary min-h-screen">
{% block content %}{% endblock %}
<script src="/static/js/api.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
