# ============================================================
#  Agente Estudos — Configuração
#  Copie este arquivo para config.yaml e preencha as chaves.
# ============================================================

# Provider ativo: anthropic | openai | groq | ollama
provider: anthropic

# ── Anthropic ────────────────────────────────────────────────
anthropic:
  api_key: "sk-ant-api03-..."
  model: "claude-opus-4-8"           # claude-sonnet-4-6 | claude-haiku-4-5-20251001

# ── OpenAI ───────────────────────────────────────────────────
openai:
  api_key: "sk-...
  model: "gpt-4o-mini"                    # gpt-4o-mini | gpt-4-turbo

# ── Groq ─────────────────────────────────────────────────────
groq:
  api_key: gsk... 
  model: "llama-3.3-70b-versatile"   # mixtral-8x7b-32768 | gemma2-9b-it

# ── Ollama (local) ───────────────────────────────────────────
ollama:
  base_url: "http://localhost:11434"
  model: "llama3.2:latest"           # qwen2.5:14b | mistral | gemma3

# ── Transcrição de Vídeo ─────────────────────────────────────
# Como transcrever vídeos locais (YouTube usa yt-dlp automaticamente)
# auto: tenta groq, depois local, depois nenhum
# groq: usa API Whisper do Groq (rápido, grátis no free tier)
# local: usa openai-whisper ou faster-whisper instalado localmente
# none: pula transcrição de arquivos locais
transcription:
  provider: auto
  groq_api_key: ""                   # deixe vazio para usar groq.api_key acima
  local_model: "base"                # tiny | base | small | medium | large

# ── Busca Web ────────────────────────────────────────────────
search:
  max_results: 5                     # resultados por query de pesquisa

# ── Embeddings (busca semântica do --chat) ────────────────────
# Provider usado para indexar e buscar nos materiais de estudo (tool search_vault).
# ollama: local, sem custo — requer `ollama pull nomic-embed-text` (ou bge-m3 para PT-BR)
# openai: API, usa openai.api_key acima se "api_key" abaixo ficar vazio
# voyage: API (voyageai.com), barato e boa qualidade multilíngue
embedding:
  provider: ollama
  ollama:
    base_url: "http://localhost:11434"   # mesmo valor de ollama.base_url acima, se já usa Ollama
    model: "nomic-embed-text"             # bge-m3 (melhor em PT-BR, ~1.2GB) | all-minilm (menor, ~46MB)
  openai:
    api_key: ""                           # deixe vazio para usar openai.api_key acima
    model: "text-embedding-3-small"
  voyage:
    api_key: ""
    model: "voyage-3-lite"

# ── Web (estudAI) ──────────────────────────────────────────────
# Subpastas imediatas de vault_root aparecem como "espaços" na home do frontend web.
# Não restringe nada — "Abrir pasta existente" aceita qualquer caminho absoluto.
web:
  vault_root: "~/obsidian"

# ── Descoberta de Fontes (buscar_fontes.py) ───────────────────
# Todos os campos são opcionais — o sistema funciona sem eles.
# github_token: aumenta rate limit da API do GitHub (60→5000 req/hora)
# youtube_api_key: melhora metadados de vídeos (não obrigatório)
source_discovery:
  github_token: ""          # ghp_... (opcional)
  youtube_api_key: ""       # AIza... (opcional, não usado atualmente)
  max_per_camada: 5         # fontes por camada (fundamentos / moderno / pratico)
  min_youtube_duration: 300 # duração mínima de vídeos em segundos (padrão: 5 min)
  min_github_stars: 100     # estrelas mínimas para repositórios GitHub
